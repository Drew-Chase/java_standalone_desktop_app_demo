plugins {
    id 'java'
}

group = 'com.github.drewchase'
version = '1.0-SNAPSHOT'
base {
    archivesName = 'app_demo'
}

// Use a real JDK (not IntelliJ's JBR, which ships without jlink).
// Gradle downloads/locates a matching JDK and exposes its tools.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:6.0.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}

tasks.named('jar') {
    archiveVersion = ''
    // Bundle all runtime deps into the jar if you add any later
    manifest {
        attributes 'Main-Class': 'com.github.drewchase.Main'
    }
}

// ── CMake launcher ──────────────────────────────────────────────────────────

def launcherDir = file("$rootDir/launcher")
def cmakeBuildDir = file("$buildDir/bin/obj/release")
def cmakeInstallDir = file("$buildDir/dist")

tasks.register('cmakeConfigure', Exec) {
    group = 'build'
    description = 'Configure the CMake launcher project'
    inputs.file("$launcherDir/CMakeLists.txt")
    outputs.dir(cmakeBuildDir)


    // cmake.exe -DCMAKE_BUILD_TYPE=Release -DCMAKE_MAKE_PROGRAM=C:/Users/drew_/AppData/Local/Programs/CLion/bin/ninja/win/x64/ninja.exe -G Ninja -S .\launcher -B .\launcher\bin\obj\release
    commandLine 'cmake',
            '-DCMAKE_BUILD_TYPE=Release',
            '-DCMAKE_MAKE_PROGRAM=C:/Users/drew_/AppData/Local/Programs/CLion/bin/ninja/win/x64/ninja.exe',
            '-S', launcherDir.absolutePath,
            '-B', cmakeBuildDir.absolutePath,
            '-G', 'Ninja'
}

tasks.register('cmakeBuild', Exec) {
    group = 'build'
    description = 'Build the CMake launcher'
    dependsOn 'cmakeConfigure'
    // Track the actual sources so edits to main.c / CMakeLists.txt trigger a rebuild.
    // (cmakeBuildDir alone doesn't change in a way Gradle reliably detects.)
    inputs.files(fileTree(launcherDir) {
        include '*.c', '*.h', 'CMakeLists.txt'
    })
    outputs.dir("$launcherDir/bin")

    //cmake.exe --build .\launcher\bin\obj\release --target launcher -j 8
    commandLine 'cmake',
            '--build', cmakeBuildDir.absolutePath,
            '--target', 'launcher',
            '-j', '8'
}

// Resolve the JDK from the configured toolchain (has jlink, unlike the JBR).
def jdkLauncher = javaToolchains.launcherFor {
    languageVersion = JavaLanguageVersion.of(21)
}
def runtimeDir = file("$cmakeInstallDir/jre")

tasks.register('jlink', Exec) {
    group = 'distribution'
    description = 'Builds a minimal Java runtime image into dist/jre'
    dependsOn 'jar'

    inputs.file(tasks.named('jar').get().archiveFile)
    outputs.dir(runtimeDir)

    def jdkHome = jdkLauncher.get().metadata.installationPath.asFile
    def jlinkExe = new File(jdkHome, 'bin/jlink')

    // jlink refuses to write into an existing directory — clear it first.
    doFirst {
        delete runtimeDir
    }

    commandLine jlinkExe.absolutePath,
            '--add-modules', 'java.desktop',   // add whatever your app needs
            '--output', runtimeDir.absolutePath,
            '--strip-debug',
            '--compress=2',
            '--no-header-files',
            '--no-man-pages'
}

// ── Assemble distributable ──────────────────────────────────────────────────

tasks.register('assembleDistrib') {
    group = 'distribution'
    description = 'Assembles launcher exe + jar + JRE into build/dist'
    dependsOn 'jar', 'cmakeBuild', 'jlink'

    def distBinDir = file("$cmakeInstallDir/bin")

    doFirst {
        distBinDir.mkdirs()
    }

    doLast {
        // 1. Copy the fat jar into dist/bin/
        copy {
            from tasks.named('jar').get().archiveFile
            into distBinDir
        }

        // 2. Copy the launcher exe into dist/, renamed to the jar's archive name
        //    (e.g. app_demo.exe) so the launcher matches the application.
        copy {
            from fileTree("$launcherDir/bin/launcher").matching {
                include '*.exe'
                exclude '*-debug.exe'
            }
            into cmakeInstallDir
            rename '.*\\.exe', "${base.archivesName.get()}.exe"
        }
    }
}


